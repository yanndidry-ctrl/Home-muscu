<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>HomeMuscu – Calibration</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 20px; background:#0f172a; color:#e5e7eb; }
    h1, h2 { color:#facc15; }
    .card { background:#020617; border:1px solid #1f2937; border-radius:12px; padding:16px; margin-bottom:16px; max-width:480px; }
    label { display:block; margin:8px 0 4px; }
    input, select, button { width:100%; padding:10px; margin:4px 0 8px; border-radius:8px; border:1px solid #4b5563; background:#020617; color:#e5e7eb; }
    button { cursor:pointer; background:#facc15; color:#020617; font-weight:600; border:none; }
    button:disabled { background:#4b5563; cursor:not-allowed; }
    .tag { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; margin-left:6px; background:#111827; border:1px solid #374151; }
    .small { font-size:13px; color:#9ca3af; }
    .highlight { color:#facc15; font-weight:600; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .pill-disabled { opacity:0.4; }
  </style>
</head>
<body>

  <h1>HomeMuscu – Calibration</h1>

  <!-- ÉTAPE 1 : TEST MAX -->
  <div class="card">
    <h2>Étape 1 – Test de pompes max</h2>
    <label for="maxPompes">Combien de pompes propres peux-tu faire en une série max ?</label>
    <input type="number" id="maxPompes" min="0" max="200" placeholder="Ex : 50" />
    <button id="validerMax">Valider mon niveau</button>
    <p id="niveauTexte" class="small"></p>
  </div>

  <!-- ÉTAPE 2 : DIFFICULTÉ -->
  <div class="card" id="blocDifficulte" style="display:none;">
    <h2>Étape 2 – Choix de la difficulté</h2>
    <p class="small">Ton niveau limite les choix possibles pour rester efficace et sécurisé.</p>
    <div class="grid">
      <button id="btnFacile">Facile</button>
      <button id="btnNormal">Normal</button>
      <button id="btnDifficile">Difficile</button>
    </div>
    <p id="infoDiff" class="small"></p>
  </div>

  <!-- ÉTAPE 3 : SÉANCE GÉNÉRÉE -->
  <div class="card" id="blocSeance" style="display:none;">
    <h2>Semaine 1 – Séance générée</h2>
    <p class="small">Basée sur ton test max et la difficulté choisie.</p>
    <ul id="detailsSeance" class="small"></ul>
  </div>

  <script>
    const maxInput = document.getElementById('maxPompes');
    const validerMaxBtn = document.getElementById('validerMax');
    const niveauTexte = document.getElementById('niveauTexte');
    const blocDifficulte = document.getElementById('blocDifficulte');
    const blocSeance = document.getElementById('blocSeance');
    const btnFacile = document.getElementById('btnFacile');
    const btnNormal = document.getElementById('btnNormal');
    const btnDifficile = document.getElementById('btnDifficile');
    const infoDiff = document.getElementById('infoDiff');
    const detailsSeance = document.getElementById('detailsSeance');

    let state = {
      max: 0,
      niveau: null,
      difficulteAutorisee: [],
      difficulteChoisie: null
    };

    function classifierNiveau(max) {
      if (max <= 5) return 'ultra_debutant';
      if (max <= 10) return 'debutant';
      if (max <= 20) return 'intermediaire';
      if (max <= 40) return 'confirme';
      if (max <= 60) return 'avance';
      return 'athlete';
    }

    const labelsNiveau = {
      ultra_debutant: 'Ultra débutant (0–5 pompes)',
      debutant: 'Débutant (6–10 pompes)',
      intermediaire: 'Intermédiaire (11–20 pompes)',
      confirme: 'Confirmé (21–40 pompes)',
      avance: 'Avancé (41–60 pompes)',
      athlete: 'Athlète (60+ pompes)'
    };

    const difficulteAutoriseeMap = {
      ultra_debutant: ['Facile'],
      debutant: ['Facile', 'Normal'],
      intermediaire: ['Facile', 'Normal', 'Difficile'],
      confirme: ['Facile', 'Normal', 'Difficile'],
      avance: ['Facile', 'Normal', 'Difficile'],
      athlete: ['Facile', 'Normal', 'Difficile']
    };

    const tables = {
      dips: {
        ultra_debutant: '4–6',
        debutant: '8–10',
        intermediaire: '12–14',
        confirme: '14–16',
        avance: '16–18',
        athlete: '18–20'
      },
      curl: {
        ultra_debutant: '6–8',
        debutant: '8–10',
        intermediaire: '10–12',
        confirme: '12–14',
        avance: '14–16',
        athlete: '16–18'
      },
      gainage: {
        ultra_debutant: '15–20 sec',
        debutant: '25–30 sec',
        intermediaire: '35–40 sec',
        confirme: '45–50 sec',
        avance: '50–60 sec',
        athlete: '60–75 sec'
      },
      repos: {
        ultra_debutant: '30 sec',
        debutant: '25 sec',
        intermediaire: '20 sec',
        confirme: '15–20 sec',
        avance: '10–15 sec',
        athlete: '10 sec'
      },
      series: {
        ultra_debutant: 2,
        debutant: 2,
        intermediaire: 3,
        confirme: 3,
        avance: 3,
        athlete: 4
      }
    };

    function calculPompesTravail(max, difficulte) {
      const map = { 'Facile': 0.40, 'Normal': 0.50, 'Difficile': 0.60 };
      return Math.max(1, Math.round(max * map[difficulte]));
    }

    function majBoutonsDifficulte() {
      const allowed = state.difficulteAutorisee;
      const setBtn = (btn, label) => {
        if (allowed.includes(label)) {
          btn.disabled = false;
          btn.classList.remove('pill-disabled');
        } else {
          btn.disabled = true;
          btn.classList.add('pill-disabled');
        }
      };
      setBtn(btnFacile, 'Facile');
      setBtn(btnNormal, 'Normal');
      setBtn(btnDifficile, 'Difficile');

      if (!allowed.includes('Difficile')) {
        infoDiff.textContent = 'Le mode "Difficile" se débloque à partir de 11 pompes max.';
      } else {
        infoDiff.textContent = 'Tu peux choisir librement la difficulté.';
      }
    }

    function genererSeance() {
      const n = state.niveau;
      const d = state.difficulteChoisie;
      const max = state.max;
      const pompes = calculPompesTravail(max, d);
      const dips = tables.dips[n];
      const curl = tables.curl[n];
      const gainage = tables.gainage[n];
      const repos = tables.repos[n];
      const series = tables.series[n];

      detailsSeance.innerHTML = `
        <li><span class="highlight">Pompes :</span> ${pompes} reps</li>
        <li><span class="highlight">Dips sur chaise :</span> ${dips} reps</li>
        <li><span class="highlight">Curl biceps :</span> ${curl} reps</li>
        <li><span class="highlight">Gainage :</span> ${gainage}</li>
        <li><span class="highlight">Repos entre exercices :</span> ${repos}</li>
        <li><span class="highlight">Nombre de séries :</span> ${series}</li>
      `;
      blocSeance.style.display = 'block';
    }

    validerMaxBtn.addEventListener('click', () => {
      const max = parseInt(maxInput.value, 10);
      if (isNaN(max) || max < 0) {
        alert('Entre un nombre valide de pompes.');
        return;
      }
      state.max = max;
      state.niveau = classifierNiveau(max);
      state.difficulteAutorisee = difficulteAutoriseeMap[state.niveau];
      state.difficulteChoisie = null;
      blocSeance.style.display = 'none';

      niveauTexte.textContent = `Niveau détecté : ${labelsNiveau[state.niveau]}`;
      blocDifficulte.style.display = 'block';
      majBoutonsDifficulte();
    });

    function choisirDifficulte(label) {
      state.difficulteChoisie = label;
      genererSeance();
    }

    btnFacile.addEventListener('click', () => {
      if (!state.difficulteAutorisee.includes('Facile')) return;
      choisirDifficulte('Facile');
    });

    btnNormal.addEventListener('click', () => {
      if (!state.difficulteAutorisee.includes('Normal')) return;
      choisirDifficulte('Normal');
    });

    btnDifficile.addEventListener('click', () => {
      if (!state.difficulteAutorisee.includes('Difficile')) return;
      choisirDifficulte('Difficile');
    });
  </script>
</body>
</html>
