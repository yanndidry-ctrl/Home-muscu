<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Muscu</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --accent: #22c55e;
            --text-main: #e5e7eb;
            --text-soft: #9ca3af;
            --border: #1f2937;
            --danger: #ef4444;
            --warn: #f59e0b;
            --ok: #22c55e;
            --mid: #f97316;
            --current: #3b82f6;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top, #1f2937 0, #020617 55%);
            color: var(--text-main);
            padding: 16px;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-soft);
        }

        .card {
            background: rgba(15, 23, 42, 0.96);
            border-radius: 18px;
            padding: 16px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--text-soft);
            margin-bottom: 10px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .input-row input, .input-row select {
            flex: 1;
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #020617;
            color: var(--text-main);
        }

        .input-row button {
            padding: 8px 14px;
            border-radius: 999px;
            border: none;
            background: var(--accent);
            color: #022c22;
            font-weight: 600;
        }

        .exercise {
            margin-bottom: 30px;
        }

        .exercise h2 {
            margin: 0 0 6px 0;
            font-size: 20px;
        }

        .exercise p {
            margin: 0 0 10px 0;
            color: var(--text-soft);
        }

        iframe {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            border: none;
            margin-top: 10px;
        }

        /* TIMER */
        .timer-block {
            text-align: center;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid var(--accent);
        }

        .timer-display {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .timer-btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            background: var(--accent);
            color: #022c22;
            font-weight: 600;
            margin: 4px;
        }

        /* CALENDRIER */
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-top: 12px;
        }

        .day {
            width: 100%;
            padding: 10px 0;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
        }

        .d0 { background: var(--danger); }
        .d1 { background: var(--warn); }
        .d2 { background: var(--mid); }
        .d3 { background: var(--ok); }
        .current { outline: 2px solid var(--current); }
        .future { background: #1e293b; color: var(--text-soft); }

        .session-footer {
            text-align: center;
            margin-top: 20px;
        }

        .session-footer button {
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.9);
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <div class="app">

        <header class="header">
            <div class="title">Programme Home Muscu</div>
            <div class="subtitle">Basé sur ton max + difficulté + progression + calendrier</div>
        </header>

        <!-- MAX POMPES + DIFFICULTÉ -->
        <section class="card">
            <div class="section-title">Point de départ</div>

            <div class="input-row">
                <input type="number" id="maxPompesInput" placeholder="Ton max de pompes">
            </div>

            <div class="input-row">
                <select id="difficultySelect">
                    <option value="0.5">Facile (50%)</option>
                    <option value="0.6">Normal (60%)</option>
                    <option value="0.7">Difficile (70%)</option>
                </select>
                <button onclick="saveSettings()">OK</button>
            </div>

            <p id="settingsInfo" style="font-size:12px;color:var(--text-soft);">
                Configure ton niveau une fois. Tout sera mémorisé.
            </p>
        </section>

        <!-- SEANCE -->
        <main class="card">
            <div class="section-title">Séance du jour</div>

            <p style="font-size:13px;color:var(--text-soft);margin-bottom:20px;">
                Niveau progression : <span id="levelLabel">1</span>
            </p>

            <!-- EXERCICE 1 : POMPES -->
            <div class="exercise">
                <h2>Pompes</h2>
                <p id="pompesReps">4 séries · 12 répétitions</p>

                <div class="timer-block">
                    <div class="timer-display" id="timer1">60</div>
                    <button class="timer-btn" onclick="startTimer(1)">Start</button>
                    <button class="timer-btn" onclick="resetTimer(1)">Reset</button>
                </div>

                <iframe src="https://www.youtube.com/embed/_l3ySVKYVJ8" allowfullscreen></iframe>
            </div>

            <!-- EXERCICE 2 : SQUATS -->
            <div class="exercise">
                <h2>Squats</h2>
                <p id="squatsReps">4 séries · 15 répétitions</p>

                <div class="timer-block">
                    <div class="timer-display" id="timer2">60</div>
