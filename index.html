<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Muscu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #222;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .exercice {
            margin-bottom: 20px;
        }
        .exercice h2 {
            margin-bottom: 5px;
            color: #444;
        }
        .exercice p {
            margin: 0;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Programme Home Muscu</h1>

    <div class="container">
        <div class="exercice">
            <h2>Pompes</h2>
            <p>4 séries de 12 répétitions</p>
        </div>

        <div class="exercice">
            <h2>Squats</h2>
            <p>4 séries de 15 répétitions</p>
        </div>

        <div class="exercice">
            <h2>Gainage</h2>
            <p>3 × 1 minute</p>
        </div>
    </div>

</body>
</html>
